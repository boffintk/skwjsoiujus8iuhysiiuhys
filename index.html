<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links Rapidos</title>
    <style>
        body {
            background: linear-gradient(135deg, #6b46c1, #1e3a8a);
            color: white;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            text-align: center;
            padding: 30px;
        }
        h1 {
            font-size: 3em;
            margin: 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        /* Logo de cabecera con glitch/neón rojo */
        .logo-yt {
            width: 140px;
            height: 90px;
            background: #FF0000;
            color: white;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.2em;
            font-weight: bold;
            margin: 20px auto;
            box-shadow: 0 0 30px #ff0000, inset 0 0 15px rgba(255,255,255,0.4);
            text-shadow: 0 0 10px #fff;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            padding: 30px;
            width: 90%;
        }
        .card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .logo {
            width: 130px;
            height: 130px;
            margin: 20px auto;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0.3s ease;
            overflow: hidden; /* Evita que la imagen se salga de los bordes */
        }
        /* Efecto extra al pasar el mouse por la tarjeta */
        .card:hover .logo {
            transform: scale(1.05);
        }
        button {
            background: #fff;
            color: #6b46c1;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        button:hover {
            background: #ffd700;
            color: #000;
            transform: scale(1.05);
            box-shadow: 0 0 15px #ffd700;
        }
        footer {
            margin-top: auto;
            padding: 20px;
            opacity: 0.8;
        }

        /* --- DETALLES DE LOS LOGOS NEÓN FIEL A LAS MARCAS --- */
        
        /* YouTube: Rojo neón puro */
        .logo-youtube {
            background: #FF0000; 
            font-size: 4.8em; 
            box-shadow: 0 0 35px #ff0000, inset 0 0 15px rgba(255,255,255,0.3);
            text-shadow: 0 0 12px rgba(255,255,255,0.8);
        }
        /* TikTok: El icónico glitch Neón Cyan y Rojo */
        .logo-tiktok {
            background: #010101; 
            color: #fff; 
            font-size: 4.5em; 
            border: 4px solid #00f2fe; 
            box-shadow: 0 0 25px #00f2fe, 0 0 40px #fe2d55, inset 0 0 10px rgba(0,242,254,0.5);
            text-shadow: 3px 3px 0px #fe2d55, -3px -3px 0px #00f2fe;
        }
        /* Omenasito: Imagen personalizada con borde redondeado y neón adaptado */
        .logo-omenasito {
            background: linear-gradient(135deg, #111, #bd1c1c); 
            border-radius: 50%; /* Hace el contenedor circular igual que la imagen */
            box-shadow: 0 0 35px #39FF14, inset 0 0 15px rgba(189, 28, 28, 0.4);
        }
        .logo-omenasito img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ajusta la imagen perfectamente al contenedor */
        }
        /* SSSTik: Descarga Neón Violeta */
        .logo-ssstik {
            background: #7c3aed; 
            color: white; 
            font-size: 5.5em; 
            box-shadow: 0 0 35px #a78bfa, inset 0 0 15px rgba(255,255,255,0.3);
            text-shadow: 0 0 15px #fff;
        }
        /* Grok: Verde Matrix / Cyberpunk */
        .logo-grok {
            background: #000; 
            color: #00FF9F; 
            font-size: 4.5em; 
            border: 4px solid #00FF9F; 
            box-shadow: 0 0 30px #00FF9F, inset 0 0 15px rgba(0,255,159,0.3);
            text-shadow: 0 0 15px #00FF9F;
            font-family: monospace;
        }
        /* Sprunkis: Musical Neón Lima */
        .logo-sprunkis {
            background: linear-gradient(135deg, #00FF00, #006400); 
            color: #fff; 
            font-size: 4.2em; 
            box-shadow: 0 0 35px #39FF14, inset 0 0 10px rgba(255,255,255,0.5);
            text-shadow: 0 0 15px #39FF14;
        }
        /* ChatGPT: El logo oficial con su característico tono Esmeralda brillante */
        .logo-chatgpt {
            background: #10A37F; 
            color: white; 
            font-size: 2.2em; 
            box-shadow: 0 0 35px #10A37F, inset 0 0 15px rgba(255,255,255,0.3);
            text-shadow: 0 0 10px rgba(255,255,255,0.6);
        }
        /* Roblox: El clásico bloque inclinado con brillo metálico y neón naranja */
        .logo-roblox {
            background: #191919; 
            color: #ff3333; 
            font-size: 4.5em; 
            border: 4px solid #ff3333;
            box-sizing: border-box;
            box-shadow: 0 0 35px #ff3333, inset 0 0 15px rgba(255,51,51,0.4);
            text-shadow: 0 0 15px #ff3333;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-yt">▶</div>
        <h1>Links Favoritos</h1>
    </header>

    <div class="container">
        <div class="card">
            <h2>YouTube</h2>
            <div class="logo logo-youtube">▶</div>
            <button onclick="window.open('https://www.youtube.com/?app=desktop&hl=es', '_blank')">Ir a YouTube</button>
        </div>

        <div class="card">

        <div class="card">

            <div class="logo logo-omenasito">
                <img src="77372.jpg" alt="Logo Omenasito">
            </div>
            <button onclick="window.open('https://www.youtube.com/@Omenasito', '_blank')">Canal Omenasito</button>

        <div class="card">

        <div class="card">

        <div class="card">

        </div>

        <div class="card">
            <h2>Roblox</h2>
            <div class="logo logo-roblox">R</div>
            <button onclick="window.open('https://www.roblox.com/es/home', '_blank')">Ir a Roblox</button>
        </div>
    </div>

    <footer>
        <p>Hecho con vibes purple</p>
    </footer>
</body>
</html>
